<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 200" width="300" height="200">
  <defs>
    <linearGradient id="paperGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FAFAFA"/>
      <stop offset="50%" style="stop-color:#F5F5F5"/>
      <stop offset="100%" style="stop-color:#E5E5E5"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="4" stdDeviation="3" flood-opacity="0.15"/>
    </filter>
    <pattern id="perf" width="4" height="4" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="0.5" fill="#D4D4D4"/>
    </pattern>
  </defs>
  
  <!-- Fundo -->
  <rect width="300" height="200" fill="#F8F9FA"/>
  
  <!-- Padrão sutil -->
  <pattern id="grid" width="20" height="20" patternUnits="userSpaceOnUse">
    <path d="M 20 0 L 0 0 0 20" fill="none" stroke="#E9ECEF" stroke-width="0.5"/>
  </pattern>
  <rect width="300" height="200" fill="url(#grid)"/>
  
  <!-- Rolo de fita -->
  <g filter="url(#shadow)" transform="translate(150, 65)">
    <!-- Rolo principal (vista lateral 3D) -->
    <ellipse cx="0" cy="0" rx="45" ry="30" fill="url(#paperGrad)" stroke="#D4D4D4" stroke-width="1"/>
    
    <!-- Microperfuração (padrão de pontos) -->
    <ellipse cx="0" cy="0" rx="43" ry="28" fill="url(#perf)"/>
    
    <!-- Camadas do rolo -->
    <ellipse cx="0" cy="0" rx="40" ry="26" fill="none" stroke="#E5E5E5" stroke-width="0.5"/>
    <ellipse cx="0" cy="0" rx="35" ry="23" fill="none" stroke="#E5E5E5" stroke-width="0.5"/>
    <ellipse cx="0" cy="0" rx="30" ry="20" fill="none" stroke="#E5E5E5" stroke-width="0.5"/>
    <ellipse cx="0" cy="0" rx="25" ry="17" fill="none" stroke="#E5E5E5" stroke-width="0.5"/>
    
    <!-- Centro do rolo (tubo) -->
    <ellipse cx="0" cy="0" rx="18" ry="12" fill="#E5E7EB" stroke="#D1D5DB" stroke-width="1"/>
    <ellipse cx="0" cy="0" rx="12" ry="8" fill="#F3F4F6" stroke="#D1D5DB" stroke-width="0.5"/>
    
    <!-- Ponta da fita desenrolando -->
    <path d="M45 -5 Q60 -10 70 0 Q65 10 55 8" fill="url(#paperGrad)" stroke="#D4D4D4" stroke-width="0.5"/>
    <rect x="55" y="-2" width="15" height="8" fill="url(#perf)" opacity="0.5"/>
  </g>
  
  <!-- Ícone microperfurado -->
  <g transform="translate(80, 50)">
    <circle cx="0" cy="0" r="3" fill="#AA000E" opacity="0.3"/>
    <circle cx="8" cy="0" r="3" fill="#AA000E" opacity="0.3"/>
    <circle cx="16" cy="0" r="3" fill="#AA000E" opacity="0.3"/>
  </g>
  
  <!-- Texto -->
  <text x="150" y="150" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#333">Fita Microperfurada</text>
  <text x="150" y="168" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#666">Tratamento das juntas</text>
  <text x="150" y="185" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="500" fill="#AA000E">GYPSUM</text>
</svg>
