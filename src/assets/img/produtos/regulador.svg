<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 200" width="300" height="200">
  <defs>
    <linearGradient id="metalGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#D1D5DB"/>
      <stop offset="30%" style="stop-color:#F3F4F6"/>
      <stop offset="50%" style="stop-color:#E5E7EB"/>
      <stop offset="70%" style="stop-color:#F3F4F6"/>
      <stop offset="100%" style="stop-color:#D1D5DB"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="4" stdDeviation="3" flood-opacity="0.2"/>
    </filter>
  </defs>
  
  <!-- Fundo -->
  <rect width="300" height="200" fill="#F8F9FA"/>
  
  <!-- Padrão sutil -->
  <pattern id="grid" width="20" height="20" patternUnits="userSpaceOnUse">
    <path d="M 20 0 L 0 0 0 20" fill="none" stroke="#E9ECEF" stroke-width="0.5"/>
  </pattern>
  <rect width="300" height="200" fill="url(#grid)"/>
  
  <!-- Regulador (peça em formato de gancho/clipe) -->
  <g filter="url(#shadow)" transform="translate(100, 30)">
    <!-- Haste superior -->
    <rect x="20" y="10" width="60" height="12" rx="1" fill="url(#metalGrad)" stroke="#9CA3AF" stroke-width="0.5"/>
    <!-- Furos -->
    <circle cx="35" cy="16" r="4" fill="#9CA3AF"/>
    <circle cx="35" cy="16" r="2.5" fill="#F8F9FA"/>
    <circle cx="65" cy="16" r="4" fill="#9CA3AF"/>
    <circle cx="65" cy="16" r="2.5" fill="#F8F9FA"/>
    
    <!-- Haste vertical -->
    <rect x="45" y="22" width="10" height="70" rx="1" fill="url(#metalGrad)" stroke="#9CA3AF" stroke-width="0.5"/>
    <!-- Serrilhado -->
    <line x1="47" y1="35" x2="53" y2="35" stroke="#9CA3AF" stroke-width="0.5"/>
    <line x1="47" y1="45" x2="53" y2="45" stroke="#9CA3AF" stroke-width="0.5"/>
    <line x1="47" y1="55" x2="53" y2="55" stroke="#9CA3AF" stroke-width="0.5"/>
    <line x1="47" y1="65" x2="53" y2="65" stroke="#9CA3AF" stroke-width="0.5"/>
    <line x1="47" y1="75" x2="53" y2="75" stroke="#9CA3AF" stroke-width="0.5"/>
    
    <!-- Base inferior -->
    <rect x="35" y="92" width="30" height="10" rx="1" fill="url(#metalGrad)" stroke="#9CA3AF" stroke-width="0.5"/>
  </g>
  
  <!-- Texto -->
  <text x="150" y="150" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#333">Regulador</text>
  <text x="150" y="168" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#666">Regulagem de altura</text>
  <text x="150" y="185" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="500" fill="#AA000E">BARBIERI</text>
</svg>
