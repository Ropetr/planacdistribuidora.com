<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 200" width="300" height="200">
  <defs>
    <linearGradient id="rfGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F8B4C0"/>
      <stop offset="100%" style="stop-color:#E8899A"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="4" stdDeviation="3" flood-opacity="0.15"/>
    </filter>
  </defs>
  
  <!-- Fundo -->
  <rect width="300" height="200" fill="#F8F9FA"/>
  
  <!-- Padrão sutil -->
  <pattern id="grid" width="20" height="20" patternUnits="userSpaceOnUse">
    <path d="M 20 0 L 0 0 0 20" fill="none" stroke="#E9ECEF" stroke-width="0.5"/>
  </pattern>
  <rect width="300" height="200" fill="url(#grid)"/>
  
  <!-- Chapa RF (rosa) -->
  <g filter="url(#shadow)">
    <rect x="85" y="35" width="130" height="90" rx="3" fill="url(#rfGrad)" stroke="#D97A8A" stroke-width="1"/>
    <!-- Borda rebaixada -->
    <rect x="90" y="40" width="120" height="3" fill="#D97A8A" opacity="0.5"/>
    <rect x="90" y="117" width="120" height="3" fill="#D97A8A" opacity="0.5"/>
    <!-- Textura -->
    <line x1="100" y1="55" x2="200" y2="55" stroke="#D97A8A" stroke-width="0.3" opacity="0.3"/>
    <line x1="100" y1="70" x2="200" y2="70" stroke="#D97A8A" stroke-width="0.3" opacity="0.3"/>
    <line x1="100" y1="85" x2="200" y2="85" stroke="#D97A8A" stroke-width="0.3" opacity="0.3"/>
    <line x1="100" y1="100" x2="200" y2="100" stroke="#D97A8A" stroke-width="0.3" opacity="0.3"/>
  </g>
  
  <!-- Ícone de fogo -->
  <g transform="translate(230, 45)">
    <path d="M15 0C15 0 12 8 12 12C12 16 15 18 15 18C15 18 18 16 18 12C18 8 15 0 15 0Z" fill="#AA000E" opacity="0.8"/>
    <path d="M12 5C12 5 10 10 10 13C10 16 12 17 12 17C12 17 14 16 14 13C14 10 12 5 12 5Z" fill="#FF6B6B" opacity="0.6"/>
  </g>
  
  <!-- Texto -->
  <text x="150" y="150" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#333">Chapa RF</text>
  <text x="150" y="168" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#666">Resistente ao Fogo</text>
  <text x="150" y="185" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="500" fill="#AA000E">GYPSUM</text>
</svg>
