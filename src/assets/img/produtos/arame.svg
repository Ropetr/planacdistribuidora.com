<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 200" width="300" height="200">
  <defs>
    <linearGradient id="wireGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#9CA3AF"/>
      <stop offset="50%" style="stop-color:#D1D5DB"/>
      <stop offset="100%" style="stop-color:#9CA3AF"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="4" stdDeviation="3" flood-opacity="0.2"/>
    </filter>
  </defs>
  
  <!-- Fundo -->
  <rect width="300" height="200" fill="#F8F9FA"/>
  
  <!-- Padrão sutil -->
  <pattern id="grid" width="20" height="20" patternUnits="userSpaceOnUse">
    <path d="M 20 0 L 0 0 0 20" fill="none" stroke="#E9ECEF" stroke-width="0.5"/>
  </pattern>
  <rect width="300" height="200" fill="url(#grid)"/>
  
  <!-- Rolo de arame -->
  <g filter="url(#shadow)" transform="translate(150, 70)">
    <!-- Espiras do rolo (elipses concêntricas) -->
    <ellipse cx="0" cy="0" rx="55" ry="35" fill="none" stroke="url(#wireGrad)" stroke-width="3"/>
    <ellipse cx="0" cy="0" rx="50" ry="32" fill="none" stroke="url(#wireGrad)" stroke-width="2.5"/>
    <ellipse cx="0" cy="0" rx="45" ry="29" fill="none" stroke="url(#wireGrad)" stroke-width="2.5"/>
    <ellipse cx="0" cy="0" rx="40" ry="26" fill="none" stroke="url(#wireGrad)" stroke-width="2"/>
    <ellipse cx="0" cy="0" rx="35" ry="23" fill="none" stroke="url(#wireGrad)" stroke-width="2"/>
    <ellipse cx="0" cy="0" rx="30" ry="20" fill="none" stroke="url(#wireGrad)" stroke-width="1.5"/>
    <ellipse cx="0" cy="0" rx="25" ry="17" fill="none" stroke="url(#wireGrad)" stroke-width="1.5"/>
    <ellipse cx="0" cy="0" rx="20" ry="14" fill="none" stroke="url(#wireGrad)" stroke-width="1"/>
    <!-- Centro do rolo -->
    <ellipse cx="0" cy="0" rx="15" ry="10" fill="#E5E7EB" stroke="#9CA3AF" stroke-width="0.5"/>
    
    <!-- Ponta do arame solta -->
    <path d="M55 -10 Q70 -20 65 5" fill="none" stroke="url(#wireGrad)" stroke-width="2" stroke-linecap="round"/>
  </g>
  
  <!-- Badge "10" -->
  <g transform="translate(215, 35)">
    <circle cx="0" cy="0" r="15" fill="#AA000E"/>
    <text x="0" y="5" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="white">10</text>
  </g>
  
  <!-- Texto -->
  <text x="150" y="150" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#333">Arame 10</text>
  <text x="150" y="168" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#666">Fixação da estrutura</text>
  <text x="150" y="185" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="500" fill="#AA000E">GERDAU</text>
</svg>
