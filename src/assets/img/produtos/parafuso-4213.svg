<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 200" width="300" height="200">
  <defs>
    <linearGradient id="zincGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#9CA3AF"/>
      <stop offset="30%" style="stop-color:#D1D5DB"/>
      <stop offset="50%" style="stop-color:#E5E7EB"/>
      <stop offset="70%" style="stop-color:#D1D5DB"/>
      <stop offset="100%" style="stop-color:#9CA3AF"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="4" stdDeviation="3" flood-opacity="0.2"/>
    </filter>
  </defs>
  
  <!-- Fundo -->
  <rect width="300" height="200" fill="#F8F9FA"/>
  
  <!-- Padrão sutil -->
  <pattern id="grid" width="20" height="20" patternUnits="userSpaceOnUse">
    <path d="M 20 0 L 0 0 0 20" fill="none" stroke="#E9ECEF" stroke-width="0.5"/>
  </pattern>
  <rect width="300" height="200" fill="url(#grid)"/>
  
  <!-- Parafuso pequeno (cabeça trombeta/flangeada) -->
  <g filter="url(#shadow)" transform="translate(150, 65)">
    <!-- Cabeça trombeta/flangeada -->
    <ellipse cx="0" cy="0" rx="18" ry="6" fill="url(#zincGrad)" stroke="#6B7280" stroke-width="0.5"/>
    <path d="M-18 0 Q-15 8 -8 10 L8 10 Q15 8 18 0" fill="url(#zincGrad)" stroke="#6B7280" stroke-width="0.5"/>
    
    <!-- Fenda Phillips -->
    <line x1="-8" y1="0" x2="8" y2="0" stroke="#6B7280" stroke-width="2"/>
    <line x1="0" y1="-6" x2="0" y2="6" stroke="#6B7280" stroke-width="2"/>
    
    <!-- Corpo curto do parafuso -->
    <rect x="-5" y="10" width="10" height="35" rx="1" fill="url(#zincGrad)" stroke="#6B7280" stroke-width="0.3"/>
    
    <!-- Rosca -->
    <g stroke="#6B7280" stroke-width="0.5">
      <line x1="-5" y1="15" x2="5" y2="18"/>
      <line x1="-5" y1="22" x2="5" y2="25"/>
      <line x1="-5" y1="29" x2="5" y2="32"/>
      <line x1="-5" y1="36" x2="5" y2="39"/>
    </g>
    
    <!-- Ponta agulha -->
    <path d="M-5 45 L0 55 L5 45" fill="url(#zincGrad)" stroke="#6B7280" stroke-width="0.3"/>
  </g>
  
  <!-- Badge dimensões -->
  <g transform="translate(220, 45)">
    <rect x="-22" y="-10" width="44" height="20" rx="3" fill="#AA000E"/>
    <text x="0" y="5" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="white">4,2x13</text>
  </g>
  
  <!-- Texto -->
  <text x="150" y="150" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#333">Parafuso 4,2x13</text>
  <text x="150" y="168" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#666">União dos perfis metálicos</text>
  <text x="150" y="185" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="500" fill="#AA000E">CISER</text>
</svg>
