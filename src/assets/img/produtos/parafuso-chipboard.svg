<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 200" width="300" height="200">
  <defs>
    <linearGradient id="bicroGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#B8860B"/>
      <stop offset="30%" style="stop-color:#DAA520"/>
      <stop offset="50%" style="stop-color:#FFD700"/>
      <stop offset="70%" style="stop-color:#DAA520"/>
      <stop offset="100%" style="stop-color:#B8860B"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="4" stdDeviation="3" flood-opacity="0.2"/>
    </filter>
  </defs>
  
  <!-- Fundo -->
  <rect width="300" height="200" fill="#F8F9FA"/>
  
  <!-- Padrão sutil -->
  <pattern id="grid" width="20" height="20" patternUnits="userSpaceOnUse">
    <path d="M 20 0 L 0 0 0 20" fill="none" stroke="#E9ECEF" stroke-width="0.5"/>
  </pattern>
  <rect width="300" height="200" fill="url(#grid)"/>
  
  <!-- Parafuso Chipboard (diagonal) -->
  <g filter="url(#shadow)" transform="translate(150, 70) rotate(-30)">
    <!-- Cabeça chata -->
    <ellipse cx="0" cy="-45" rx="12" ry="4" fill="url(#bicroGrad)" stroke="#8B7355" stroke-width="0.5"/>
    <path d="M-12 -45 L-8 -38 L8 -38 L12 -45" fill="url(#bicroGrad)" stroke="#8B7355" stroke-width="0.5"/>
    
    <!-- Fenda Phillips -->
    <line x1="-6" y1="-45" x2="6" y2="-45" stroke="#8B7355" stroke-width="1.5"/>
    <line x1="0" y1="-51" x2="0" y2="-39" stroke="#8B7355" stroke-width="1.5"/>
    
    <!-- Corpo do parafuso -->
    <rect x="-4" y="-38" width="8" height="70" rx="1" fill="url(#bicroGrad)" stroke="#8B7355" stroke-width="0.3"/>
    
    <!-- Rosca (linhas diagonais) -->
    <g stroke="#8B7355" stroke-width="0.5">
      <line x1="-4" y1="-30" x2="4" y2="-25"/>
      <line x1="-4" y1="-20" x2="4" y2="-15"/>
      <line x1="-4" y1="-10" x2="4" y2="-5"/>
      <line x1="-4" y1="0" x2="4" y2="5"/>
      <line x1="-4" y1="10" x2="4" y2="15"/>
      <line x1="-4" y1="20" x2="4" y2="25"/>
    </g>
    
    <!-- Ponta -->
    <path d="M-4 32 L0 40 L4 32" fill="url(#bicroGrad)" stroke="#8B7355" stroke-width="0.3"/>
  </g>
  
  <!-- Badge dimensões -->
  <g transform="translate(220, 45)">
    <rect x="-22" y="-10" width="44" height="20" rx="3" fill="#AA000E"/>
    <text x="0" y="5" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="white">4,5x45</text>
  </g>
  
  <!-- Texto -->
  <text x="150" y="150" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#333">Parafuso Chipboard</text>
  <text x="150" y="168" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#666">Fixação buchas no teto</text>
  <text x="150" y="185" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="500" fill="#AA000E">CISER</text>
</svg>
