  </pattern>
  <rect width="300" height="200" fill="url(#grid)"/>
  <g filter="url(#shadow)">
    <rect x="85" y="35" width="130" height="90" rx="3" fill="url(#ruGrad)" stroke="#5BA06A" stroke-width="1"/>
    <rect x="90" y="40" width="120" height="3" fill="#5BA06A" opacity="0.5"/>
    <rect x="90" y="117" width="120" height="3" fill="#5BA06A" opacity="0.5"/>
    <line x1="100" y1="55" x2="200" y2="55" stroke="#5BA06A" stroke-width="0.3" opacity="0.3"/>
    <line x1="100" y1="70" x2="200" y2="70" stroke="#5BA06A" stroke-width="0.3" opacity="0.3"/>
    <line x1="100" y1="85" x2="200" y2="85" stroke="#5BA06A" stroke-width="0.3" opacity="0.3"/>
    <line x1="100" y1="100" x2="200" y2="100" stroke="#5BA06A" stroke-width="0.3" opacity="0.3"/>
  </g>
  <g transform="translate(230, 45)">
    <path d="M0 -8 Q8 -8 8 0 Q8 8 0 8 Q-8 8 -8 0 Q-8 -8 0 -8" fill="#2196F3" opacity="0.8"/>
    <path d="M-4 2 Q0 6 4 2" fill="none" stroke="white" stroke-width="1.5"/>
  </g>
  <text x="150" y="150" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#333">Chapa RU</text>
  <text x="150" y="168" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#666">Resistente à Umidade</text>
  <text x="150" y="185" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="500" fill="#AA000E">GYPSUM</text>
