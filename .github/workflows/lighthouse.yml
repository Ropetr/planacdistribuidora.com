name: Lighthouse CI

on:
  push:
    branches: [main]
  schedule:
    - cron: '0 6 * * 1'  # Segunda-feira às 6h

jobs:
  lighthouse:
    runs-on: ubuntu-latest
    name: Análise Lighthouse
    steps:
      - uses: actions/checkout@v4
      
      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Instalar Lighthouse CI
        run: npm install -g @lhci/cli
      
      - name: Criar configuração Lighthouse
        run: |
          cat > lighthouserc.json << 'EOF'
          {
            "ci": {
              "collect": {
                "url": [
                  "https://planacdistribuidora.com/",
                  "https://planacdistribuidora.com/forro-gesso",
                  "https://planacdistribuidora.com/divisoria-drywall",
                  "https://planacdistribuidora.com/la-de-pet"
                ],
                "numberOfRuns": 3
              },
              "assert": {
                "assertions": {
                  "categories:performance": ["warn", {"minScore": 0.8}],
                  "categories:accessibility": ["warn", {"minScore": 0.9}],
                  "categories:best-practices": ["warn", {"minScore": 0.9}],
                  "categories:seo": ["warn", {"minScore": 0.9}]
                }
              },
              "upload": {
                "target": "temporary-public-storage"
              }
            }
          }
          EOF
      
      - name: Executar Lighthouse
        run: lhci autorun
        
      - name: Gerar Resumo
        if: always()
        run: |
          echo "## Relatório Lighthouse" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "URLs analisadas:" >> $GITHUB_STEP_SUMMARY
          echo "- https://planacdistribuidora.com/" >> $GITHUB_STEP_SUMMARY
          echo "- https://planacdistribuidora.com/forro-gesso" >> $GITHUB_STEP_SUMMARY
          echo "- https://planacdistribuidora.com/divisoria-drywall" >> $GITHUB_STEP_SUMMARY
          echo "- https://planacdistribuidora.com/la-de-pet" >> $GITHUB_STEP_SUMMARY
