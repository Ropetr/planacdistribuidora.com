name: Validação Completa do Site

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build Site
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          
      - name: Install dependencies
        run: npm ci
        
      - name: Build site with Eleventy
        run: npm run build
        
      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  validate-html:
    name: Validar HTML
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download dist artifact
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
          
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          
      - name: Install html-validate
        run: npm install -g html-validate
        
      - name: Validate HTML files
        run: |
          echo "=== VALIDANDO HTML ==="
          for file in dist/*.html; do
            echo "Validando: $file"
            html-validate "$file" || true
          done

  check-consistency:
    name: Verificar Consistência
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download dist artifact
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
          
      - name: Check header consistency
        run: |
          echo "=== VERIFICANDO CONSISTÊNCIA ==="
          LOGO_COUNT=$(grep -l 'height:60px' dist/*.html | wc -l)
          TOTAL=$(ls dist/*.html | wc -l)
          echo "Páginas com logo 60px: $LOGO_COUNT / $TOTAL"
          
          FONT_COUNT=$(grep -l 'font-weight:500' dist/*.html | wc -l)
          echo "Páginas com font-weight 500: $FONT_COUNT / $TOTAL"

  check-css:
    name: Verificar CSS
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download dist artifact
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
          
      - name: Check CSS files exist
        run: |
          echo "=== VERIFICANDO CSS ==="
          ls -la dist/css/

  check-seo:
    name: Verificar SEO
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download dist artifact
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
          
      - name: Check SEO elements
        run: |
          echo "=== VERIFICANDO SEO ==="
          for file in dist/*.html; do
            echo "--- $file ---"
            grep -o '<title>[^<]*</title>' "$file" | head -1 || echo "Sem title"
            grep -o 'name="description"' "$file" | head -1 || echo "Sem description"
            grep -o 'rel="canonical"' "$file" | head -1 || echo "Sem canonical"
          done
