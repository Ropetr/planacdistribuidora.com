name: Verificação de Consistência

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check-consistency:
    runs-on: ubuntu-latest
    name: Verificar Consistência
    steps:
      - uses: actions/checkout@v4
      
      - name: Verificar Header Consistente
        run: |
          echo "## Verificação de Consistência" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Headers" >> $GITHUB_STEP_SUMMARY
          
          # Extrair e comparar headers
          reference=""
          for file in *.html; do
            header=$(grep -oP '<header[^>]*class="header"[^>]*>.*?</header>' "$file" | head -1 | md5sum | cut -d' ' -f1)
            if [ -z "$reference" ]; then
              reference=$header
              echo "- $file: Referência (hash: ${header:0:8})" >> $GITHUB_STEP_SUMMARY
            elif [ "$header" != "$reference" ]; then
              echo "- $file: ⚠️ Header diferente (hash: ${header:0:8})" >> $GITHUB_STEP_SUMMARY
            else
              echo "- $file: ✅ OK" >> $GITHUB_STEP_SUMMARY
            fi
          done
      
      - name: Verificar Footer Consistente
        run: |
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Footers" >> $GITHUB_STEP_SUMMARY
          
          reference=""
          for file in *.html; do
            footer=$(grep -oP '<footer[^>]*>.*?</footer>' "$file" | head -1 | md5sum | cut -d' ' -f1)
            if [ -z "$reference" ]; then
              reference=$footer
              echo "- $file: Referência (hash: ${footer:0:8})" >> $GITHUB_STEP_SUMMARY
            elif [ "$footer" != "$reference" ]; then
              echo "- $file: ⚠️ Footer diferente (hash: ${footer:0:8})" >> $GITHUB_STEP_SUMMARY
            else
              echo "- $file: ✅ OK" >> $GITHUB_STEP_SUMMARY
            fi
          done
      
      - name: Verificar Meta Tags
        run: |
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Meta Tags Obrigatórias" >> $GITHUB_STEP_SUMMARY
          
          for file in *.html; do
            issues=""
            
            # Verificar viewport
            if ! grep -q 'name="viewport"' "$file"; then
              issues="$issues viewport"
            fi
            
            # Verificar description
            if ! grep -q 'name="description"' "$file"; then
              issues="$issues description"
            fi
            
            # Verificar canonical
            if ! grep -q 'rel="canonical"' "$file"; then
              issues="$issues canonical"
            fi
            
            # Verificar og:title
            if ! grep -q 'property="og:title"' "$file"; then
              issues="$issues og:title"
            fi
            
            if [ -z "$issues" ]; then
              echo "- $file: ✅ Todas as meta tags presentes" >> $GITHUB_STEP_SUMMARY
            else
              echo "- $file: ⚠️ Faltando:$issues" >> $GITHUB_STEP_SUMMARY
            fi
          done
      
      - name: Verificar CSS Mobile Rules
        run: |
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### CSS - Regras Mobile" >> $GITHUB_STEP_SUMMARY
          
          css_file="css/styles.min.css"
          if [ -f "$css_file" ]; then
            # Verificar se nav-desktop display:none está dentro de media query
            if grep -q "@media.*768px.*nav-desktop.*display:none" "$css_file" || \
               grep -q "@media.*768.*{.*\.nav-desktop{display:none" "$css_file"; then
              echo "- nav-desktop: ✅ Dentro de media query" >> $GITHUB_STEP_SUMMARY
            else
              # Verificar se está solto
              if grep -q "\.nav-desktop{display:none" "$css_file"; then
                echo "- nav-desktop: ⚠️ Pode estar fora de media query" >> $GITHUB_STEP_SUMMARY
              fi
            fi
            
            # Verificar footer-fixed-mobile
            count=$(grep -o "\.footer-fixed-mobile{display:flex" "$css_file" | wc -l)
            if [ "$count" -gt 1 ]; then
              echo "- footer-fixed-mobile: ⚠️ Regra duplicada ($count ocorrências)" >> $GITHUB_STEP_SUMMARY
            else
              echo "- footer-fixed-mobile: ✅ OK" >> $GITHUB_STEP_SUMMARY
            fi
          fi
