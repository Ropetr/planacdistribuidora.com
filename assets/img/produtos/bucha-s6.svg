<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 200" width="300" height="200">
  <defs>
    <linearGradient id="plasticGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#9CA3AF"/>
      <stop offset="50%" style="stop-color:#6B7280"/>
      <stop offset="100%" style="stop-color:#4B5563"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="4" stdDeviation="3" flood-opacity="0.2"/>
    </filter>
  </defs>
  
  <!-- Fundo -->
  <rect width="300" height="200" fill="#F8F9FA"/>
  
  <!-- Padrão sutil -->
  <pattern id="grid" width="20" height="20" patternUnits="userSpaceOnUse">
    <path d="M 20 0 L 0 0 0 20" fill="none" stroke="#E9ECEF" stroke-width="0.5"/>
  </pattern>
  <rect width="300" height="200" fill="url(#grid)"/>
  
  <!-- Bucha de Nylon com aba -->
  <g filter="url(#shadow)" transform="translate(150, 65)">
    <!-- Aba superior (disco) -->
    <ellipse cx="0" cy="-5" rx="25" ry="8" fill="#9CA3AF" stroke="#6B7280" stroke-width="1"/>
    
    <!-- Corpo da bucha (cilindro com ranhuras) -->
    <rect x="-10" y="-5" width="20" height="55" rx="2" fill="url(#plasticGrad)" stroke="#4B5563" stroke-width="0.5"/>
    
    <!-- Ranhuras de expansão -->
    <line x1="-8" y1="5" x2="-8" y2="45" stroke="#4B5563" stroke-width="0.5"/>
    <line x1="8" y1="5" x2="8" y2="45" stroke="#4B5563" stroke-width="0.5"/>
    
    <!-- Cortes de expansão -->
    <line x1="-10" y1="50" x2="10" y2="50" stroke="#F8F9FA" stroke-width="1"/>
    <path d="M-8 35 L0 40 L8 35" fill="none" stroke="#4B5563" stroke-width="0.5"/>
    
    <!-- Ponta -->
    <path d="M-8 50 L0 58 L8 50" fill="url(#plasticGrad)" stroke="#4B5563" stroke-width="0.5"/>
    
    <!-- Furo central -->
    <ellipse cx="0" cy="-5" rx="6" ry="2" fill="#4B5563"/>
  </g>
  
  <!-- Badge "S6" -->
  <g transform="translate(210, 45)">
    <rect x="-15" y="-10" width="30" height="20" rx="3" fill="#AA000E"/>
    <text x="0" y="5" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="white">S6</text>
  </g>
  
  <!-- Texto -->
  <text x="150" y="150" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#333">Bucha S6 c/ Aba</text>
  <text x="150" y="168" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#666">Ancoragem concreto/laje</text>
  <text x="150" y="185" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="500" fill="#AA000E">PENTAFIX</text>
</svg>
