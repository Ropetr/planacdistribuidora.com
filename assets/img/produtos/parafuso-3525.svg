<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 200" width="300" height="200">
  <defs>
    <linearGradient id="blackGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1F2937"/>
      <stop offset="30%" style="stop-color:#374151"/>
      <stop offset="50%" style="stop-color:#4B5563"/>
      <stop offset="70%" style="stop-color:#374151"/>
      <stop offset="100%" style="stop-color:#1F2937"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="4" stdDeviation="3" flood-opacity="0.2"/>
    </filter>
  </defs>
  
  <!-- Fundo -->
  <rect width="300" height="200" fill="#F8F9FA"/>
  
  <!-- Padrão sutil -->
  <pattern id="grid" width="20" height="20" patternUnits="userSpaceOnUse">
    <path d="M 20 0 L 0 0 0 20" fill="none" stroke="#E9ECEF" stroke-width="0.5"/>
  </pattern>
  <rect width="300" height="200" fill="url(#grid)"/>
  
  <!-- Parafuso Drywall (preto fosforisado) - cabeça trombeta -->
  <g filter="url(#shadow)" transform="translate(150, 60)">
    <!-- Cabeça trombeta baixa -->
    <ellipse cx="0" cy="0" rx="14" ry="5" fill="url(#blackGrad)" stroke="#111827" stroke-width="0.5"/>
    <path d="M-14 0 Q-12 6 -6 8 L6 8 Q12 6 14 0" fill="url(#blackGrad)" stroke="#111827" stroke-width="0.5"/>
    
    <!-- Fenda Phillips -->
    <line x1="-6" y1="0" x2="6" y2="0" stroke="#6B7280" stroke-width="1.5"/>
    <line x1="0" y1="-5" x2="0" y2="5" stroke="#6B7280" stroke-width="1.5"/>
    
    <!-- Corpo do parafuso -->
    <rect x="-4" y="8" width="8" height="45" rx="1" fill="url(#blackGrad)" stroke="#111827" stroke-width="0.3"/>
    
    <!-- Rosca dupla entrada (característica drywall) -->
    <g stroke="#6B7280" stroke-width="0.5">
      <line x1="-4" y1="15" x2="4" y2="18"/>
      <line x1="-4" y1="17" x2="4" y2="20"/>
      <line x1="-4" y1="24" x2="4" y2="27"/>
      <line x1="-4" y1="26" x2="4" y2="29"/>
      <line x1="-4" y1="33" x2="4" y2="36"/>
      <line x1="-4" y1="35" x2="4" y2="38"/>
      <line x1="-4" y1="42" x2="4" y2="45"/>
      <line x1="-4" y1="44" x2="4" y2="47"/>
    </g>
    
    <!-- Ponta agulha afiada -->
    <path d="M-4 53 L0 65 L4 53" fill="url(#blackGrad)" stroke="#111827" stroke-width="0.3"/>
  </g>
  
  <!-- Badge dimensões -->
  <g transform="translate(220, 45)">
    <rect x="-22" y="-10" width="44" height="20" rx="3" fill="#AA000E"/>
    <text x="0" y="5" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="white">3,5x25</text>
  </g>
  
  <!-- Texto -->
  <text x="150" y="150" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#333">Parafuso 3,5x25</text>
  <text x="150" y="168" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#666">Fixação das chapas</text>
  <text x="150" y="185" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="500" fill="#AA000E">GYPSUM</text>
</svg>
