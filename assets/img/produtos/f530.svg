      <stop offset="30%" style="stop-color:#E8EEF2"/>
      <stop offset="50%" style="stop-color:#D4DEE6"/>
      <stop offset="70%" style="stop-color:#E8EEF2"/>
      <stop offset="100%" style="stop-color:#B8C4CE"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
