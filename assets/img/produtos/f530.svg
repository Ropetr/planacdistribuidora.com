    <ellipse cx="-60" cy="-12" rx="3" ry="1.5" fill="#8899AA"/>
    <ellipse cx="-30" cy="-12" rx="3" ry="1.5" fill="#8899AA"/>
    <ellipse cx="0" cy="-12" rx="3" ry="1.5" fill="#8899AA"/>
    <ellipse cx="30" cy="-12" rx="3" ry="1.5" fill="#8899AA"/>
    <ellipse cx="60" cy="-12" rx="3" ry="1.5" fill="#8899AA"/>
  </g>
  <g transform="translate(225, 45)">
    <rect x="-18" y="-10" width="36" height="20" rx="3" fill="#AA000E"/>
    <text x="0" y="5" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="white">F-530</text>
  </g>
  <text x="150" y="150" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#333">F-530</text>
