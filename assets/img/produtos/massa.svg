<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 200" width="300" height="200">
  <defs>
    <linearGradient id="bucketGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1565C0"/>
      <stop offset="50%" style="stop-color:#1976D2"/>
      <stop offset="100%" style="stop-color:#1565C0"/>
    </linearGradient>
    <linearGradient id="lidGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#42A5F5"/>
      <stop offset="100%" style="stop-color:#1E88E5"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="4" stdDeviation="3" flood-opacity="0.2"/>
    </filter>
  </defs>
  <rect width="300" height="200" fill="#F8F9FA"/>
  <pattern id="grid" width="20" height="20" patternUnits="userSpaceOnUse">
    <path d="M 20 0 L 0 0 0 20" fill="none" stroke="#E9ECEF" stroke-width="0.5"/>
  </pattern>
  <rect width="300" height="200" fill="url(#grid)"/>
  <g filter="url(#shadow)" transform="translate(150, 65)">
    <path d="M-35 -30 L35 -30 L40 50 L-40 50 Z" fill="url(#bucketGrad)" stroke="#0D47A1" stroke-width="1"/>
    <ellipse cx="0" cy="-30" rx="35" ry="8" fill="url(#lidGrad)" stroke="#0D47A1" stroke-width="0.5"/>
    <ellipse cx="0" cy="-32" rx="30" ry="6" fill="#64B5F6"/>
    <path d="M-25 -25 L-25 -20" stroke="white" stroke-width="0.5" opacity="0.3"/>
    <path d="M25 -25 L25 -20" stroke="white" stroke-width="0.5" opacity="0.3"/>
    <rect x="-28" y="-5" width="56" height="35" rx="2" fill="white" opacity="0.9"/>
    <text x="0" y="8" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" font-weight="bold" fill="#1565C0">MASSA</text>
    <text x="0" y="18" text-anchor="middle" font-family="Arial, sans-serif" font-size="6" fill="#1565C0">DRYWALL</text>
    <path d="M-30 45 Q0 55 30 45" fill="none" stroke="#0D47A1" stroke-width="0.5"/>
  </g>
  <text x="150" y="150" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#333">Massa Drywall</text>
  <text x="150" y="168" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#666">Acabamento de juntas</text>
  <text x="150" y="185" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="500" fill="#AA000E">DRYBOX</text>
</svg>