<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 200" width="300" height="200">
  <defs>
    <linearGradient id="stGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FAFAFA"/>
      <stop offset="100%" style="stop-color:#E8E8E8"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="4" stdDeviation="3" flood-opacity="0.15"/>
    </filter>
  </defs>
  <rect width="300" height="200" fill="#F8F9FA"/>
  <pattern id="grid" width="20" height="20" patternUnits="userSpaceOnUse">
    <path d="M 20 0 L 0 0 0 20" fill="none" stroke="#E9ECEF" stroke-width="0.5"/>
  </pattern>
  <rect width="300" height="200" fill="url(#grid)"/>
  <g filter="url(#shadow)">
    <rect x="85" y="35" width="130" height="90" rx="3" fill="url(#stGrad)" stroke="#D1D5DB" stroke-width="1"/>
    <rect x="90" y="40" width="120" height="3" fill="#D1D5DB" opacity="0.5"/>
    <rect x="90" y="117" width="120" height="3" fill="#D1D5DB" opacity="0.5"/>
    <line x1="100" y1="55" x2="200" y2="55" stroke="#D1D5DB" stroke-width="0.3" opacity="0.3"/>
    <line x1="100" y1="70" x2="200" y2="70" stroke="#D1D5DB" stroke-width="0.3" opacity="0.3"/>
    <line x1="100" y1="85" x2="200" y2="85" stroke="#D1D5DB" stroke-width="0.3" opacity="0.3"/>
    <line x1="100" y1="100" x2="200" y2="100" stroke="#D1D5DB" stroke-width="0.3" opacity="0.3"/>
  </g>
  <g transform="translate(225, 45)">
    <rect x="-12" y="-10" width="24" height="20" rx="3" fill="#AA000E"/>
    <text x="0" y="5" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="white">ST</text>
  </g>
  <text x="150" y="150" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#333">Chapa ST</text>
  <text x="150" y="168" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#666">Placa Standard</text>
  <text x="150" y="185" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="500" fill="#AA000E">GYPSUM</text>
</svg>