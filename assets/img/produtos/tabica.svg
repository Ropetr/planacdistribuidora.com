<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 200" width="300" height="200">
  <defs>
    <linearGradient id="whiteMetalGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#E8E8E8"/>
      <stop offset="30%" style="stop-color:#FFFFFF"/>
      <stop offset="50%" style="stop-color:#F5F5F5"/>
      <stop offset="70%" style="stop-color:#FFFFFF"/>
      <stop offset="100%" style="stop-color:#E8E8E8"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="4" stdDeviation="3" flood-opacity="0.15"/>
    </filter>
  </defs>
  <rect width="300" height="200" fill="#F8F9FA"/>
  <pattern id="grid" width="20" height="20" patternUnits="userSpaceOnUse">
    <path d="M 20 0 L 0 0 0 20" fill="none" stroke="#E9ECEF" stroke-width="0.5"/>
  </pattern>
  <rect width="300" height="200" fill="url(#grid)"/>
  <g filter="url(#shadow)" transform="translate(150, 65)">
    <path d="M-70 -20 L70 -20 L70 -15 L-70 -15 Z" fill="url(#whiteMetalGrad)" stroke="#CCCCCC" stroke-width="0.5"/>
    <path d="M-70 -15 L-70 25 L-65 25 L-65 -15 Z" fill="url(#whiteMetalGrad)" stroke="#CCCCCC" stroke-width="0.5"/>
    <path d="M-65 20 L70 20 L70 25 L-65 25 Z" fill="url(#whiteMetalGrad)" stroke="#CCCCCC" stroke-width="0.5"/>
    <line x1="-68" y1="-17" x2="-68" y2="22" stroke="#E0E0E0" stroke-width="0.5"/>
    <line x1="-67" y1="22" x2="67" y2="22" stroke="#E0E0E0" stroke-width="0.5"/>
  </g>
  <text x="150" y="150" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#333">Tabica Branca</text>
  <text x="150" y="168" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#666">Acabamento de bordas</text>
  <text x="150" y="185" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="500" fill="#AA000E">BARBIERI</text>
</svg>